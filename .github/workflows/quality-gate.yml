name: YAML quality gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  yaml-quality:
    name: Validate YAML quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check:ci

      - name: Upload YAML validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaml-quality-report
          path: reports/yaml-quality.json
          if-no-files-found: warn
          retention-days: 14

  docker-quality:
    name: Validate Docker quality image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build QA quality image
        run: docker build --tag qa-yaml-ci-lab:ci .

      - name: Run quality gate in Docker
        run: docker run --rm qa-yaml-ci-lab:ci
