version: 1
standard: wcag-2.2-aa
checks:
  - name: keyboard-navigation
    severity: critical
    requiredSuites:
      - smoke
      - regression
  - name: color-contrast
    severity: serious
    requiredSuites:
      - regression
  - name: aria-labels
    severity: serious
