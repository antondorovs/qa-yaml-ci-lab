version: 1
browsers:
  - name: chromium
    channel: stable
    requiredSuites:
      - smoke
      - regression
  - name: firefox
    channel: stable
    requiredSuites:
      - smoke
      - regression
  - name: webkit
    channel: stable
    requiredSuites:
      - smoke
viewports:
