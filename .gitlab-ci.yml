stages:
  - quality

default:
  image: node:24-alpine
  interruptible: true

yaml_quality:
  stage: quality
  timeout: 10 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run check:ci
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/yaml-quality.json
