stages:
  - quality

default:
  image: node:24-alpine
  interruptible: true

yaml_quality:
  stage: quality
  timeout: 10 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run check:ci
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/yaml-quality.json

docker_quality:
  stage: quality
  image: docker:28-cli
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  timeout: 15 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  script:
    - docker build --tag qa-yaml-ci-lab:ci .
    - docker run --rm qa-yaml-ci-lab:ci
