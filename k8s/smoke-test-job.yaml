apiVersion: batch/v1
kind: Job
metadata:
  name: checkout-smoke-tests
  labels:
    app.kubernetes.io/name: checkout-smoke-tests
    app.kubernetes.io/component: qa
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-smoke-tests
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-tests
          image: curlimages/curl:8.16.0
          imagePullPolicy: IfNotPresent
          env:
            - name: BASE_URL
              value: https://staging.example.test
          command:
            - sh
            - -ec
            - curl --fail --show-error --silent "${BASE_URL}/health"
