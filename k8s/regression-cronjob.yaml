apiVersion: batch/v1
kind: CronJob
metadata:
  name: checkout-regression-tests
  labels:
    app.kubernetes.io/name: checkout-regression-tests
    app.kubernetes.io/component: qa
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: checkout-regression-tests
        spec:
          restartPolicy: Never
          containers:
            - name: regression-tests
              image: curlimages/curl:8.16.0
              imagePullPolicy: IfNotPresent
              env:
                - name: BASE_URL
                  value: https://staging.example.test
              command:
                - sh
                - -ec
                - |
                  curl --fail --show-error --silent "${BASE_URL}/health"
                  curl --fail --show-error --silent "${BASE_URL}/version"
